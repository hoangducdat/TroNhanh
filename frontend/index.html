<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TroNhanh — Tìm phòng trọ nhanh nhất Việt Nam</title>
    <meta name="description" content="TroNhanh là nền tảng kết nối người thuê và chủ trọ, không qua trung gian." />

    <!-- ── Khởi tạo dark mode TRƯỚC khi React render để không bị flash trắng ── -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
